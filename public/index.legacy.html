<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Excel 自动生成工具</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=20260520-structure">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Excel 自动生成工具</h1>
          <p class="meta"><span id="fieldCount">0 个表头</span><span id="rowCount">0 行数据</span></p>
        </div>
        <button class="primary-action" id="generateBtn" type="button">生成 Excel</button>
      </header>

      <section class="workspace" aria-label="Excel 表格生成器">
        <section class="panel panel-compact config-panel" id="configPanel" aria-labelledby="configTitle">
          <div class="panel-heading">
            <h2 id="configTitle">表头配置</h2>
            <div class="heading-actions">
              <button class="config-toggle" id="toggleConfigBtn" type="button" aria-expanded="false" aria-controls="fieldList">
                <span class="config-toggle-text">展开</span>
                <span class="config-toggle-icon" aria-hidden="true">⌄</span>
              </button>
              <button class="icon-button" id="addFieldBtn" type="button" aria-label="添加表头" title="添加表头">+</button>
            </div>
          </div>
          <div class="field-list" id="fieldList">
            <div class="empty-state">页面正在加载，如果手机上长时间停留在这里，请换用系统浏览器并刷新。</div>
          </div>
        </section>

        <section class="panel panel-main" aria-labelledby="dataTitle">
          <div class="panel-heading">
            <h2 id="dataTitle">填写数据</h2>
            <div class="toolbar">
              <button class="secondary-action" id="clearRowsBtn" type="button">清空行</button>
              <button class="secondary-action" id="addCustomRowTopBtn" type="button">自由行</button>
              <button class="icon-button" id="addRowTopBtn" type="button" aria-label="添加行" title="添加行">+</button>
            </div>
          </div>
          <div class="draft-panel" id="draftPanel">
            <div class="draft-unavailable">正在读取本机草稿...</div>
          </div>
          <div class="document-name-panel">
            <label>名称
              <input id="documentName" type="text" placeholder="请输入名称">
            </label>
            <label>定金
              <input id="depositAmount" type="number" step="any" min="0" inputmode="decimal" placeholder="请输入定金">
            </label>
            <label>米数计算方式
              <select id="meterCalculationMode">
                <option value="add" selected>宽 + 高</option>
                <option value="multiply">宽 × 高</option>
                <option value="manual">自己填写</option>
              </select>
            </label>
          </div>
          <div class="shared-remark-panel" id="sharedRemarkPanel" hidden></div>
          <div class="row-list" id="rowList">
            <div class="empty-state">页面正在加载，如果手机上长时间停留在这里，请换用系统浏览器并刷新。</div>
          </div>
          <div class="bottom-row-actions">
            <button class="add-row-wide" id="addRowBottomBtn" type="button">+ 添加行</button>
            <button class="add-row-wide add-custom-wide" id="addCustomRowBottomBtn" type="button">+ 添加自由行</button>
          </div>
        </section>
      </section>

      <div class="natural-fill-dock" id="naturalFillDock">
        <div class="natural-fill-panel" id="naturalFillPanel" role="dialog" aria-modal="false" aria-labelledby="naturalFillTitle" hidden>
          <p class="natural-fill-prompt" id="naturalFillTitle">林峰帮你写：你可以告诉我窗帘的型号、安装位置等，我会帮你处理好表格</p>
          <label>描述内容
            <textarea id="naturalFillText" rows="4" placeholder="例如：客厅型号 A，宽 3.2 高 2.6，轨道 2 条单价 50"></textarea>
          </label>
          <div class="natural-fill-actions">
            <button class="secondary-action" id="naturalFillCancelBtn" type="button">取消</button>
            <button class="primary-action" id="naturalFillSubmitBtn" type="button">填入表格</button>
          </div>
        </div>
        <button class="natural-fill-launcher" id="naturalFillBtn" type="button" aria-label="智能填写" title="智能填写" aria-expanded="false" aria-controls="naturalFillPanel">智能填写</button>
      </div>

      <div class="status" id="status" role="status" aria-live="polite"></div>
      <noscript>
        <div class="status status-static is-error">当前浏览器未启用 JavaScript，无法显示表格内容。</div>
      </noscript>
    </main>
    <script type="module" src="app.js?v=20260521-edgefunc"></script>
  </body>
</html>
